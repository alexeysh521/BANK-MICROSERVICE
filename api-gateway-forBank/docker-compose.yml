version: '3.8'

services:
  # Nginx как reverse proxy
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"  # для HTTPS
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl  # SSL сертификаты
    depends_on:
      - frontend-service
      - api-gateway
    networks:
      - bank-network

  # Frontend Service
  frontend-service:
    build: ./frontend-service
    container_name: frontend-service
    expose:
      - "3000"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    networks:
      - bank-network

  # API Gateway
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    expose:
      - "8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      - eureka-server
    networks:
      - bank-network

  # Eureka Server
  eureka-server:
    image: springcloud/eureka
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - bank-network

  # База данных
  postgres:
    image: postgres:15
    container_name: postgres-db
    environment:
      POSTGRES_DB: bankdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - bank-network

networks:
  bank-network:
    driver: bridge

volumes:
  postgres-data: