server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: account-service
          uri: lb://ACCOUNT-SERVICE
          predicates:
            - Path=/account/**
          filters:
            - StripPrefix=1

        - id: transfer-service
          uri: lb://TRANSFER-SERVICE
          predicates:
            - Path=/transfer/**
          filters:
            - JwtAuthFilter

        - id: people-service
          uri: lb://PEOPLE-SERVICE
          predicates:
            - Path=/**

        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=1

#    globalcors:
#      cors-configurations:
#        '[/**]':
#          allowed-origins: "http://localhost:3000"
#          allowed-methods: "*"
#          allowed-headers: "*"
#          allow-credentials: true


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

logging:
  level:
    root: INFO
    kafka.system.api_gateway_forBank: DEBUG
    org.springframework.cloud.gateway: DEBUG